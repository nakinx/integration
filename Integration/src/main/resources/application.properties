# PostgreSQL Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/integration_db
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.sql-load-script=import.sql

# Application
quarkus.application.name=integration

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/q/openapi

# Health Checks
quarkus.smallrye-health.root-path=/q/health

# JWT Authentication
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://integration.acme.org/issuer
smallrye.jwt.sign.key.location=privateKey.pem
quarkus.native.resources.includes=publicKey.pem,privateKey.pem
